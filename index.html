<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم بنكك | الإدارة المركزية</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root {
            --primary-color: #2d5d4b; /* لون بنكك الأخضر */
            --accent-color: #e67e22;
            --bg-color: #f0f2f5;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .admin-card {
            width: 100%;
            max-width: 500px;
            background: var(--white);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            border-top: 8px solid var(--primary-color);
        }

        .header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h2 { margin: 0; font-size: 22px; }

        .content { padding: 25px; }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
            font-size: 14px;
        }

        input:focus { border-color: var(--primary-color); box-shadow: 0 0 5px rgba(45,93,75,0.2); }

        button {
            cursor: pointer;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-search { background: var(--primary-color); color: white; padding: 0 20px; }
        .btn-search:hover { background: #1e3f33; }

        .user-details {
            display: none; /* مخفي حتى يتم البحث */
            border-top: 1px solid #eee;
            padding-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 13px; }

        .balance-group {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .balance-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-action { flex: 1; padding: 10px; color: white; font-size: 12px; }
        .btn-plus { background: #27ae60; }
        .btn-minus { background: #c0392b; }

        .btn-save {
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            color: white;
            font-size: 16px;
            margin-top: 20px;
        }

        .btn-save:hover { background: #d35400; }

        .status { text-align: center; font-size: 12px; margin-top: 10px; color: #777; }
    </style>
</head>
<body>

<div class="admin-card">
    <div class="header">
        <h2>لوحة إدارة المستخدمين</h2>
    </div>

    <div class="content">
        <label>رقم حساب المستخدم (ID في فايربيس):</label>
        <div class="search-box">
            <input type="text" id="accId" placeholder="مثلاً: 1234567">
            <button class="btn-search" onclick="fetchUser()">بحث</button>
        </div>

        <div id="userDetails" class="user-details">
            <label>الاسم الكامل (يظهر في التطبيق):</label>
            <input type="text" id="userName">

            <div class="balance-group">
                <label>الرصيد الحالي (SDG):</label>
                <input type="number" id="userBalance" step="0.01">
                <div class="balance-actions">
                    <button class="btn-action btn-plus" onclick="mathBalance(true)">+ إضافة مبلغ</button>
                    <button class="btn-action btn-minus" onclick="mathBalance(false)">- خصم مبلغ</button>
                </div>
            </div>

            <label>كلمة المرور:</label>
            <input type="text" id="userPass">

            <button class="btn-save" onclick="updateToFirebase()">تحديث البيانات الآن</button>
            <p class="status">التعديلات تنعكس فوراً على تطبيق المستخدم</p>
        </div>
    </div>
</div>

<script>
    // إعدادات مشروعك التي أرسلتها
    const firebaseConfig = {
        apiKey: "AIzaSyCWDfYZSHHu6E-XRzZ1THpeMdSfxECRAl0",
        databaseURL: "https://sajobok-default-rtdb.firebaseio.com/",
        projectId: "sajobok",
        storageBucket: "sajobok.firebasestorage.app"
    };

    // تهيئة فايربيس
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // دالة البحث عن المستخدم
    function fetchUser() {
        const id = document.getElementById('accId').value;
        if (!id) return alert("يرجى إدخال رقم الحساب");

        database.ref('users/' + id).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                document.getElementById('userDetails').style.display = 'block';
                document.getElementById('userName').value = data.full_name || "";
                document.getElementById('userBalance').value = data.balance || 0;
                document.getElementById('userPass').value = data.password || "";
            } else {
                alert("عذراً، المستخدم غير موجود. تأكد من إنشاء العقدة في فايربيس أولاً.");
                document.getElementById('userDetails').style.display = 'none';
            }
        });
    }

    // دالة العمليات الحسابية السريعة للرصيد
    function mathBalance(isAdd) {
        const input = document.getElementById('userBalance');
        const amount = prompt(isAdd ? "أدخل المبلغ المراد إضافته:" : "أدخل المبلغ المراد خصمه:");
        if (amount && !isNaN(amount)) {
            const current = parseFloat(input.value);
            const change = parseFloat(amount);
            input.value = isAdd ? (current + change).toFixed(2) : (current - change).toFixed(2);
        }
    }

    // دالة الإرسال لفايربيس
    function updateToFirebase() {
        const id = document.getElementById('accId').value;
        const name = document.getElementById('userName').value;
        const balance = parseFloat(document.getElementById('userBalance').value);
        const pass = document.getElementById('userPass').value;

        database.ref('users/' + id).update({
            full_name: name,
            balance: balance,
            password: pass
        }).then(() => {
            alert("تم التحديث بنجاح! المستخدم " + name + " استلم البيانات الآن.");
        }).catch((error) => {
            alert("خطأ في التحديث: " + error.message);
        });
    }
</script>

</body>
</html>
