<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SajoBok Admin - لوحة التحكم</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --primary-red: #cc0000; /* أحمر بنكك الشهير */
            --dark-red: #990000;
            --white: #ffffff;
            --light-gray: #f4f4f4;
            --shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--light-gray); margin: 0; padding: 0; color: #333; }

        header {
            background-color: var(--primary-red);
            padding: 20px 5%;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .logo { font-size: 24px; font-weight: 900; letter-spacing: 1px; }
        .container { max-width: 1000px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }

        /* الكروت */
        .card {
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: var(--shadow);
            border-bottom: 5px solid var(--primary-red);
            transition: transform 0.3s;
        }
        .card:hover { transform: translateY(-5px); }

        h2 { color: var(--primary-red); font-size: 20px; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }

        /* مدخلات البيانات */
        .input-group { margin-bottom: 15px; position: relative; }
        .input-group i { position: absolute; right: 15px; top: 15px; color: #888; }
        input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border: 1px solid #ddd;
            border-radius: 15px;
            font-size: 15px;
            outline: none;
            background: #fafafa;
        }
        input:focus { border-color: var(--primary-red); background: #fff; }

        /* الأزرار */
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-red { background-color: var(--primary-red); color: white; }
        .btn-red:hover { background-color: var(--dark-red); box-shadow: 0 5px 15px rgba(204,0,0,0.3); }
        .btn-outline { background: transparent; border: 2px solid var(--primary-red); color: var(--primary-red); margin-bottom: 15px; }
        
        .math-box { display: flex; gap: 10px; margin-top: 10px; }
        .btn-mini { flex: 1; padding: 8px; border-radius: 10px; border: 1px solid #ccc; background: #eee; font-weight: bold; cursor: pointer; }

        /* المودال */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: white; padding: 30px; border-radius: 30px;
            text-align: center; width: 90%; max-width: 400px;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .copy-area { background: #fff5f5; padding: 20px; border: 2px dashed var(--primary-red); border-radius: 20px; margin: 20px 0; font-size: 18px; font-weight: 900; color: var(--dark-red); }

        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="logo"><i class="fas fa-shield-alt"></i> SAJOBOK ADMIN</div>
    <div style="font-size: 14px;"><i class="fas fa-circle" style="color: #00ff00; font-size: 10px;"></i> النظام يعمل</div>
</header>

<div class="container">

    <div class="card">
        <h2><i class="fas fa-user-plus"></i> إضافة مستخدم جديد</h2>
        <button class="btn btn-outline" onclick="generateAccountNumber()">
            <i class="fas fa-magic"></i> توليد رقم حساب عشوائي
        </button>
        <div class="input-group">
            <i class="fas fa-fingerprint"></i>
            <input type="text" id="newAccId" placeholder="رقم الحساب سيظهر هنا" readonly>
        </div>
        <div class="input-group">
            <i class="fas fa-user-tag"></i>
            <input type="text" id="newUserName" placeholder="اسم المستخدم الكامل (English)">
        </div>
        <div class="input-group">
            <i class="fas fa-money-bill-wave"></i>
            <input type="number" id="newUserBalance" placeholder="الرصيد الافتتاحي">
        </div>
        <div class="input-group">
            <i class="fas fa-key"></i>
            <input type="text" id="newUserPass" placeholder="تعيين كلمة المرور">
        </div>
        <button class="btn btn-red" onclick="addNewUser()">
            <i class="fas fa-cloud-upload-alt"></i> حفظ في القاعدة
        </button>
    </div>

    <div class="card">
        <h2><i class="fas fa-search-dollar"></i> إدارة الحسابات</h2>
        <div class="input-group">
            <i class="fas fa-search"></i>
            <input type="text" id="accId" placeholder="بحث برقم الحساب (7 أرقام)">
        </div>
        <button class="btn btn-red" onclick="fetchUser()" style="background-color: #333;">
            <i class="fas fa-user-search"></i> بحث عن المستخدم
        </button>

        <div id="userDetails" style="display: none; margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee;">
            <input type="hidden" id="userAccNum">
            <label style="font-size: 13px; color: #888;">الاسم:</label>
            <div class="input-group"><i class="fas fa-signature"></i><input type="text" id="userName"></div>
            
            <label style="font-size: 13px; color: #888;">الرصيد الحالي:</label>
            <div class="input-group"><i class="fas fa-coins"></i><input type="number" id="userBalance" step="0.01"></div>
            <div class="math-box">
                <button class="btn-mini" onclick="mathBalance(true)" style="color: green;">+ إضافة مبلغ</button>
                <button class="btn-mini" onclick="mathBalance(false)" style="color: red;">- خصم مبلغ</button>
            </div>

            <br>
            <label style="font-size: 13px; color: #888;">كلمة المرور:</label>
            <div class="input-group"><i class="fas fa-unlock-alt"></i><input type="text" id="userPass"></div>
            
            <button class="btn btn-red" onclick="updateToFirebase()">
                <i class="fas fa-sync-alt"></i> تحديث وحفظ التعديلات
            </button>
        </div>
    </div>
</div>

<div id="successModal" class="modal">
    <div class="modal-content">
        <i class="fas fa-check-circle" style="font-size: 70px; color: #27ae60; margin-bottom: 15px;"></i>
        <h3 style="margin: 0; color: #27ae60;">تم الحفظ بنجاح</h3>
        <p style="color: #666;">بيانات الدخول الخاصة بالمستخدم:</p>
        <div class="copy-area">
            الحساب: <span id="resAcc"></span><br>
            كلمة السر: <span id="resPass"></span>
        </div>
        <button class="btn btn-red" onclick="copyAllData()">
            <i class="fas fa-copy"></i> نسخ البيانات معاً
        </button>
        <button onclick="closeModal()" style="margin-top: 15px; border: none; background: none; color: #aaa; cursor: pointer;">إغلاق النافذة</button>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCWDfYZSHHu6E-XRzZ1THpeMdSfxECRAl0",
        databaseURL: "https://sajobok-default-rtdb.firebaseio.com/",
        projectId: "sajobok",
        storageBucket: "sajobok.firebasestorage.app"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    function generateAccountNumber() {
        const randomAcc = Math.floor(1000000 + Math.random() * 9000000);
        document.getElementById('newAccId').value = randomAcc;
    }

    function addNewUser() {
        const id = document.getElementById('newAccId').value;
        const name = document.getElementById('newUserName').value;
        const balance = document.getElementById('newUserBalance').value;
        const pass = document.getElementById('newUserPass').value;

        if (!id || !name || !pass) return alert("الرجاء ملء الحقول وتوليد الرقم");

        database.ref('users/' + id).set({
            full_name: name,
            balance: parseFloat(balance) || 0,
            password: pass,
            account_number: id
        }).then(() => {
            document.getElementById('resAcc').innerText = id;
            document.getElementById('resPass').innerText = pass;
            document.getElementById('successModal').style.display = 'flex';
        });
    }

    function copyAllData() {
        const acc = document.getElementById('resAcc').innerText;
        const pass = document.getElementById('resPass').innerText;
        const textToCopy = "Account: " + acc + " | Pass: " + pass;
        navigator.clipboard.writeText(textToCopy).then(() => { alert("تم نسخ البيانات!"); });
    }

    function closeModal() {
        document.getElementById('successModal').style.display = 'none';
        location.reload();
    }

    function fetchUser() {
        const id = document.getElementById('accId').value;
        if (!id) return alert("أدخل رقم الحساب");
        database.ref('users/' + id).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                document.getElementById('userDetails').style.display = 'block';
                document.getElementById('userAccNum').value = id;
                document.getElementById('userName').value = data.full_name || "";
                document.getElementById('userBalance').value = data.balance || 0;
                document.getElementById('userPass').value = data.password || "";
            } else { alert("عذراً، هذا المستخدم غير موجود"); }
        });
    }

    function mathBalance(isAdd) {
        const input = document.getElementById('userBalance');
        const amount = prompt("أدخل المبلغ:");
        if (amount && !isNaN(amount)) {
            const current = parseFloat(input.value) || 0;
            input.value = isAdd ? (current + parseFloat(amount)).toFixed(2) : (current - parseFloat(amount)).toFixed(2);
        }
    }

    function updateToFirebase() {
        const id = document.getElementById('userAccNum').value;
        database.ref('users/' + id).update({
            full_name: document.getElementById('userName').value,
            balance: parseFloat(document.getElementById('userBalance').value),
            password: document.getElementById('userPass').value
        }).then(() => alert("تم تحديث البيانات بنجاح"));
    }
</script>

</body>
</html>
