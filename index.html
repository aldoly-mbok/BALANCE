<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم بنكك الشاملة</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --primary-color: #2d5d4b; --accent-color: #e67e22; --new-user-color: #2980b9; --bg-color: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .admin-card { width: 100%; max-width: 500px; background: var(--white); border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; margin-bottom: 20px; border-top: 8px solid var(--primary-color); }
        .new-user-card { border-top: 8px solid var(--new-user-color); }
        .header { background: var(--primary-color); color: white; padding: 15px; text-align: center; }
        .new-user-header { background: var(--new-user-color); }
        .content { padding: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; outline: none; box-sizing: border-box; }
        button { cursor: pointer; border: none; border-radius: 8px; font-weight: bold; transition: 0.3s; padding: 12px; }
        .btn-search { background: var(--primary-color); color: white; width: 100%; margin-bottom: 10px; }
        .btn-save { width: 100%; background: var(--accent-color); color: white; font-size: 16px; margin-top: 15px; }
        .btn-add-new { width: 100%; background: var(--new-user-color); color: white; font-size: 16px; margin-top: 15px; }
        .user-details { display: none; border-top: 1px solid #eee; padding-top: 15px; }
        label { display: block; font-weight: bold; color: #555; font-size: 13px; margin-top: 10px; }
        .balance-actions { display: flex; gap: 10px; margin-top: 5px; }
        .btn-action { flex: 1; color: white; font-size: 11px; padding: 8px; }
        .btn-plus { background: #27ae60; } .btn-minus { background: #c0392b; }
    </style>
</head>
<body>

<div class="admin-card">
    <div class="header">
        <h2>البحث وتعديل مستخدم سابق</h2>
    </div>
    <div class="content">
        <label>أدخل رقم الحساب للبحث:</label>
        <input type="text" id="accId" placeholder="مثلاً: 1234567">
        <button class="btn-search" onclick="fetchUser()">بحث عن البيانات</button>

        <div id="userDetails" class="user-details">
            <label>الاسم الكامل:</label>
            <input type="text" id="userName">
            <label>الرصيد الحالي:</label>
            <input type="number" id="userBalance" step="0.01">
            <div class="balance-actions">
                <button class="btn-action btn-plus" onclick="mathBalance(true)">+ إضافة</button>
                <button class="btn-action btn-minus" onclick="mathBalance(false)">- خصم</button>
            </div>
            <label>كلمة المرور:</label>
            <input type="text" id="userPass">
            <button class="btn-save" onclick="updateToFirebase()">حفظ التعديلات</button>
        </div>
    </div>
</div>

<div class="admin-card new-user-card">
    <div class="header new-user-header">
        <h2>إضافة مستخدم جديد تماماً</h2>
    </div>
    <div class="content">
        <label>رقم الحساب الجديد (سيكون هو الـ ID):</label>
        <input type="text" id="newAccId" placeholder="أدخل رقم الحساب">
        
        <label>الاسم الكامل للمستخدم الجديد:</label>
        <input type="text" id="newUserName" placeholder="مثلاً: محمد علي">
        
        <label>الرصيد الافتتاحي:</label>
        <input type="number" id="newUserBalance" placeholder="مثلاً: 5000">
        
        <label>كلمة المرور:</label>
        <input type="text" id="newUserPass" placeholder="مثلاً: 1122">

        <button class="btn-add-new" onclick="addNewUser()">إنشاء الحساب الجديد الآن</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCWDfYZSHHu6E-XRzZ1THpeMdSfxECRAl0",
        databaseURL: "https://sajobok-default-rtdb.firebaseio.com/",
        projectId: "sajobok",
        storageBucket: "sajobok.firebasestorage.app"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // وظائف البحث والتعديل
    function fetchUser() {
        const id = document.getElementById('accId').value;
        if (!id) return alert("يرجى إدخال رقم الحساب");
        database.ref('users/' + id).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                document.getElementById('userDetails').style.display = 'block';
                document.getElementById('userName').value = snapshot.val().full_name || "";
                document.getElementById('userBalance').value = snapshot.val().balance || 0;
                document.getElementById('userPass').value = snapshot.val().password || "";
            } else {
                alert("المستخدم غير موجود");
                document.getElementById('userDetails').style.display = 'none';
            }
        });
    }

    function mathBalance(isAdd) {
        const input = document.getElementById('userBalance');
        const amount = prompt(isAdd ? "إضافة مبلغ:" : "خصم مبلغ:");
        if (amount && !isNaN(amount)) {
            const current = parseFloat(input.value);
            input.value = isAdd ? (current + parseFloat(amount)).toFixed(2) : (current - parseFloat(amount)).toFixed(2);
        }
    }

    function updateToFirebase() {
        const id = document.getElementById('accId').value;
        database.ref('users/' + id).update({
            full_name: document.getElementById('userName').value,
            balance: parseFloat(document.getElementById('userBalance').value),
            password: document.getElementById('userPass').value
        }).then(() => alert("تم التحديث!"));
    }

    // وظيفة إضافة مستخدم جديد (الكود الجديد)
    function addNewUser() {
        const id = document.getElementById('newAccId').value;
        const name = document.getElementById('newUserName').value;
        const balance = document.getElementById('newUserBalance').value;
        const pass = document.getElementById('newUserPass').value;

        if (!id || !name || !balance || !pass) {
            return alert("يرجى ملء جميع الحقول لإضافة مستخدم جديد");
        }

        database.ref('users/' + id).set({
            full_name: name,
            balance: parseFloat(balance),
            password: pass,
            account_number: id
        }).then(() => {
            alert("تم إضافة المستخدم الجديد بنجاح!");
            // تفريغ الحقول بعد الإضافة
            document.getElementById('newAccId').value = "";
            document.getElementById('newUserName').value = "";
            document.getElementById('newUserBalance').value = "";
            document.getElementById('newUserPass').value = "";
        }).catch((error) => alert("خطأ: " + error.message));
    }
</script>
</body>
</html>

</head>
<body>

<div class="admin-card">
    <div class="header">
        <h2>لوحة إدارة المستخدمين</h2>
    </div>

    <div class="content">
        <label>رقم حساب المستخدم (ID في فايربيس):</label>
        <div class="search-box">
            <input type="text" id="accId" placeholder="مثلاً: 1234567">
            <button class="btn-search" onclick="fetchUser()">بحث</button>
        </div>

        <div id="userDetails" class="user-details">
            <label>الاسم الكامل (يظهر في التطبيق):</label>
            <input type="text" id="userName">

            <div class="balance-group">
                <label>الرصيد الحالي (SDG):</label>
                <input type="number" id="userBalance" step="0.01">
                <div class="balance-actions">
                    <button class="btn-action btn-plus" onclick="mathBalance(true)">+ إضافة مبلغ</button>
                    <button class="btn-action btn-minus" onclick="mathBalance(false)">- خصم مبلغ</button>
                </div>
            </div>

            <label>كلمة المرور:</label>
            <input type="text" id="userPass">

            <button class="btn-save" onclick="updateToFirebase()">تحديث البيانات الآن</button>
            <p class="status">التعديلات تنعكس فوراً على تطبيق المستخدم</p>
        </div>
    </div>
</div>

<script>
    // إعدادات مشروعك التي أرسلتها
    const firebaseConfig = {
        apiKey: "AIzaSyCWDfYZSHHu6E-XRzZ1THpeMdSfxECRAl0",
        databaseURL: "https://sajobok-default-rtdb.firebaseio.com/",
        projectId: "sajobok",
        storageBucket: "sajobok.firebasestorage.app"
    };

    // تهيئة فايربيس
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // دالة البحث عن المستخدم
    function fetchUser() {
        const id = document.getElementById('accId').value;
        if (!id) return alert("يرجى إدخال رقم الحساب");

        database.ref('users/' + id).once('value').then((snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                document.getElementById('userDetails').style.display = 'block';
                document.getElementById('userName').value = data.full_name || "";
                document.getElementById('userBalance').value = data.balance || 0;
                document.getElementById('userPass').value = data.password || "";
            } else {
                alert("عذراً، المستخدم غير موجود. تأكد من إنشاء العقدة في فايربيس أولاً.");
                document.getElementById('userDetails').style.display = 'none';
            }
        });
    }

    // دالة العمليات الحسابية السريعة للرصيد
    function mathBalance(isAdd) {
        const input = document.getElementById('userBalance');
        const amount = prompt(isAdd ? "أدخل المبلغ المراد إضافته:" : "أدخل المبلغ المراد خصمه:");
        if (amount && !isNaN(amount)) {
            const current = parseFloat(input.value);
            const change = parseFloat(amount);
            input.value = isAdd ? (current + change).toFixed(2) : (current - change).toFixed(2);
        }
    }

    // دالة الإرسال لفايربيس
    function updateToFirebase() {
        const id = document.getElementById('accId').value;
        const name = document.getElementById('userName').value;
        const balance = parseFloat(document.getElementById('userBalance').value);
        const pass = document.getElementById('userPass').value;

        database.ref('users/' + id).update({
            full_name: name,
            balance: balance,
            password: pass
        }).then(() => {
            alert("تم التحديث بنجاح! المستخدم " + name + " استلم البيانات الآن.");
        }).catch((error) => {
            alert("خطأ في التحديث: " + error.message);
        });
    }
</script>

</body>
</html>
